<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameHub - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
      font-size: 1.8rem;
      font-weight: 600;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    main {
      padding: 20px;
      flex: 1;
    }

    h2 {
      margin-bottom: 15px;
    }

    .section {
      margin-bottom: 40px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      padding-bottom: 10px;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-bottom: 1px solid #0f172a;
    }

    .card h3 {
      margin-top: 10px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<header>🎮 GameHub</header>
<main>

  <!-- Games Section -->
  <div class="section">
    <h2>Play Games</h2>
    <div class="cards">
      <a href="games.html" class="card">
        <img src="assets/images/games-thumb.png" alt="Games">
        <h3>All Games</h3>
      </a>
    </div>
  </div>

  <!-- Sports Section -->
  <div class="section">
    <h2>Watch Sports</h2>
    <div class="cards">
      <a href="sports/MotoGP.html" target="_blank" class="card">
        <img src="assets/images/motogp.png" alt="MotoGP">
        <h3>MotoGP</h3>
      </a>
      <a href="sports/f1.html" target="_blank" class="card">
        <img src="assets/images/f1.png" alt="F1">
        <h3>F1</h3>
      </a>
    </div>
  </div>

  <!-- Tutorials Section -->
  <div class="section">
    <h2>Tutorials</h2>
    <div class="cards">
      <a href="tutorials/chromebook-reset.html" target="_blank" class="card">
        <img src="assets/images/tutorial.png" alt="Tutorial">
        <h3>Reset Chromebook</h3>
      </a>
      <a href="tutorials/js-tricks.html" target="_blank" class="card">
        <img src="assets/images/tutorial.png" alt="Tutorial">
        <h3>JS Tricks</h3>
      </a>
    </div>
  </div>

</main>

</body>
</html>
